data:
  root: ""            # required: {study_id}/{image_id}.png layout
  annotations: ""     # required: path to finding_annotations.csv
  split: "training"   # "training" | "test"
  img_size: 512
  flip_right: false   # set true if PNGs were not flipped during DICOM conversion

model:
  ngf: 64             # base channel count for generator
  ndf: 64             # base channel count for discriminator
  n_blocks: 9         # residual blocks in generator bottleneck
  nce_layers: [0, 4, 8, 12, 16]  # flat generator indices matching CUT paper
  num_patches: 256    # patches sampled per NCE layer per image
  temperature: 0.07   # PatchNCE temperature τ

train:
  batch_size: 1
  num_workers: 4
  n_epochs: 200           # paper default: epochs with constant LR
  n_epochs_decay: 200     # paper default: epochs with linear LR decay to 0
  lr: 2e-4
  beta1: 0.5              # Adam β₁
  lambda_nce: 1.0         # weight on PatchNCE(real_A, fake_B)
  lambda_idt: 1.0         # weight on identity PatchNCE(real_B, G(real_B)); 0 = disabled
  save_every: 10          # save checkpoint every N epochs
  resume: ""              # path to checkpoint; empty = train from scratch

output:
  dir: ""             # required: directory for checkpoints
